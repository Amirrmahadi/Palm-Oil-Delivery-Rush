            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .control-btn:active { background: rgba(255,255,255,0.5); }
        
        @media (max-width: 768px) {
            #mobileControls { display: flex; }
        }
    </style>
</head>
